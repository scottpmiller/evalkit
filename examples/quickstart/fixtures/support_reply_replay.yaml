# Recorded adapter outputs per case per variant (offline runs / tests).
# These mirror what examples/quickstart/adapter.py produces, so `--mode replay`
# and `--mode live` (the stub adapter) agree. Story: the baseline (v1) prompt
# collapses onto one generic reply and misreads the "billed twice" ticket as a
# question; the candidate (v2) prompt writes a distinct, empathetic reply per
# ticket and correctly routes both refunds.

refund_request:
  baseline:
    reply: "Thanks for reaching out - we'll get back to you."
    intent: refund
  candidate:
    reply: "I'm sorry for the duplicate charge - I've refunded it, and it will appear within 5-7 business days."
    intent: refund

billing_question:
  baseline:
    reply: "Thanks for reaching out - we'll get back to you."
    intent: question
  candidate:
    reply: "Happy to help! You can see every charge under Account -> Billing, and I'm here if anything looks off."
    intent: question

angry_complaint:
  baseline:
    reply: "Thanks for reaching out - we'll get back to you."
    intent: complaint
  candidate:
    reply: "I completely understand your frustration about the downtime, and I'm sorry it cost you sales. Here's how I'll make it right."
    intent: complaint

double_charge:
  baseline:
    reply: "Thanks for reaching out - we'll get back to you."
    intent: question
  candidate:
    reply: "You're right that you were billed twice - I've reversed the duplicate, which will post back within 5-7 business days."
    intent: refund
